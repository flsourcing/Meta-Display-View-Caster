name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Apple Team ID (10 chars) — embeds MWDAT.TeamID for Meta AI connection'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios-ipa.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned Bypass Market Checker
        run: |
          cd ios
          xcodebuild \
            -project "Bypass Market Checker.xcodeproj" \
            -scheme "Bypass Market Checker" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/BypassMarketChecker.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            -skipPackagePluginValidation

      - name: Inject MWDAT TeamID (matches sideload cert)
        env:
          TEAM: ${{ github.event.inputs.team_id || 'JM52FT93Z2' }}
        run: |
          PLIST="ios/build/BypassMarketChecker.xcarchive/Products/Applications/Bypass Market Checker.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :MWDAT:TeamID '$TEAM'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :MWDAT:TeamID string '$TEAM'" "$PLIST"
          echo "MWDAT in built app:"
          /usr/libexec/PlistBuddy -c "Print :MWDAT" "$PLIST"

      - name: Package IPA for Sideloadly
        run: |
          cd ios/build
          APP="BypassMarketChecker.xcarchive/Products/Applications/Bypass Market Checker.app"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r BypassMarketChecker-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BypassMarketChecker-ipa
          path: ios/build/BypassMarketChecker-unsigned.ipa
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        with:
          tag_name: ios-${{ github.run_number }}
          name: ${{ format('Meta Display View Caster iOS {0} (Team {1})', github.run_number, github.event.inputs.team_id || 'JM52FT93Z2') }}
          files: ios/build/BypassMarketChecker-unsigned.ipa
          generate_release_notes: true
