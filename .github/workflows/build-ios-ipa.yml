name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Apple Team ID (10 chars) — embeds MWDAT.TeamID for Meta AI connection'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios-ipa.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Build unsigned app
        run: |
          cd ios
          xcodebuild \
            -project ViewCasterRelay.xcodeproj \
            -scheme ViewCasterRelay \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ViewCasterRelay.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal"

      - name: Inject MWDAT credentials into built app
        env:
          TEAM: ${{ github.event.inputs.team_id || 'JM52FT93Z2' }}
          META_APP_ID: ${{ secrets.META_APP_ID || '974304118762997' }}
          META_CLIENT_TOKEN: ${{ secrets.META_CLIENT_TOKEN || 'AR|974304118762997|80d303efb43a2a01cbbb6c730fde2f8d' }}
        run: |
          PLIST="ios/build/ViewCasterRelay.xcarchive/Products/Applications/ViewCasterRelay.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :MWDAT dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :MWDAT:AppLinkURLScheme string 'viewcaster://'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :MWDAT:AppLinkURLScheme 'viewcaster://'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :MWDAT:MetaAppID string '$META_APP_ID'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :MWDAT:MetaAppID '$META_APP_ID'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :MWDAT:ClientToken string '$META_CLIENT_TOKEN'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :MWDAT:ClientToken '$META_CLIENT_TOKEN'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :MWDAT:TeamID string '$TEAM'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :MWDAT:TeamID '$TEAM'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :MWDAT:DAMEnabled" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :MWDAT:Analytics dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :MWDAT:Analytics:OptOut bool true" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :MWDAT:Analytics:OptOut true" "$PLIST"
          echo "MWDAT in built app:"
          /usr/libexec/PlistBuddy -c "Print :MWDAT" "$PLIST"

      - name: Package IPA for Sideloadly
        run: |
          cd ios/build
          APP="ViewCasterRelay.xcarchive/Products/Applications/ViewCasterRelay.app"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ViewCasterRelay-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewCasterRelay-ipa
          path: ios/build/ViewCasterRelay-unsigned.ipa
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        with:
          tag_name: ios-${{ github.run_number }}
          name: ${{ format('View Caster Relay iOS {0} (Team {1})', github.run_number, github.event.inputs.team_id || 'JM52FT93Z2') }}
          files: ios/build/ViewCasterRelay-unsigned.ipa
          generate_release_notes: true
