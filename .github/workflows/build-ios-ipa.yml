name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Apple Team ID (10 chars) — embeds MWDAT.TeamID for Meta AI connection'
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/build-ios-ipa.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Build unsigned app
        run: |
          cd ios
          xcodebuild \
            -project ViewCasterRelay.xcodeproj \
            -scheme ViewCasterRelay \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ViewCasterRelay.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_SWIFT_FLAGS="-strict-concurrency=minimal"

      - name: Inject Team ID into built app
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.team_id != ''
        run: |
          PLIST="ios/build/ViewCasterRelay.xcarchive/Products/Applications/ViewCasterRelay.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :MWDAT" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :MWDAT:TeamID" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :MWDAT:TeamID string '${{ github.event.inputs.team_id }}'" "$PLIST"
          echo "Verified MWDAT.TeamID=$(/usr/libexec/PlistBuddy -c 'Print :MWDAT:TeamID' "$PLIST")"

      - name: Package IPA for Sideloadly
        run: |
          cd ios/build
          APP="ViewCasterRelay.xcarchive/Products/Applications/ViewCasterRelay.app"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r ViewCasterRelay-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViewCasterRelay-ipa
          path: ios/build/ViewCasterRelay-unsigned.ipa
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        with:
          tag_name: ios-${{ github.run_number }}
          name: ${{ github.event.inputs.team_id != '' && format('View Caster Relay iOS {0} (Team {1})', github.run_number, github.event.inputs.team_id) || format('View Caster Relay iOS {0}', github.run_number) }}
          files: ios/build/ViewCasterRelay-unsigned.ipa
          generate_release_notes: true
