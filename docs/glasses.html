<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>View Caster — Glasses</title>
  <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body class="glasses">
  <div class="container">
    <header><h1>View Caster</h1></header>

    <div id="pairing-view">
      <p class="code-timer">Enter code from phone relay</p>
      <p id="code-timer" class="code-timer">↑↓ digit · ←→ move · Enter confirm</p>

      <div id="code-picker" class="code-picker" tabindex="0" role="group" aria-label="Pairing code">
        <div id="code-slots" class="code-slots" aria-live="polite"></div>
      </div>

      <div class="glasses-actions">
        <button id="clear-btn" type="button" class="btn btn-primary glasses-action-btn" tabindex="0">Clear</button>
        <button id="join-btn" type="button" class="btn btn-stream glasses-action-btn" tabindex="0">Connect</button>
      </div>

      <div id="status" class="status waiting">
        <span class="status-dot"></span>
        <span id="status-text">Waiting</span>
      </div>
    </div>

    <div id="connected-view" class="hidden">
      <p id="connected-label" class="connected-label">Connected</p>
      <p id="session-code" class="pair-code"></p>
      <div class="status connected"><span class="status-dot"></span><span>Linked to desktop</span></div>
      <p id="stream-hint" class="code-timer stream-hint">Select Live Stream, press Enter</p>
      <button id="stream-btn" class="btn btn-stream glasses-stream-btn" type="button" tabindex="0">Live Stream</button>
    </div>
  </div>

  <footer>Meta Display View Caster</footer>

  <script src="js/peerjs.min.js?v=10"></script>
  <script src="config.js?v=10"></script>
  <script src="js/signaling.js?v=10"></script>
  <script src="js/glasses.js?v=10"></script>
</body>
</html>
