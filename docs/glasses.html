<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Meta Display View Caster — Glasses</title>
  <link rel="stylesheet" href="css/style.css?v=40">
</head>
<body class="glasses">
  <div class="container">
    <header><h1>Meta Display View Caster</h1></header>

    <div id="connected-view">
      <p id="connected-label" class="connected-label">Connecting…</p>
      <p id="stream-hint" class="code-timer stream-hint">Linking to View Caster on your phone…</p>
      <button id="stream-btn" class="btn btn-stream glasses-stream-btn" type="button" tabindex="0">Live Stream</button>
    </div>

    <div id="status" class="status waiting">
      <span class="status-dot"></span>
      <span id="status-text">Connecting</span>
    </div>
  </div>

  <footer>Meta Display View Caster · <span id="version-label">auto</span></footer>

  <script src="js/ws-signaling.js?v=40"></script>
  <script src="js/peerjs.min.js?v=40"></script>
  <script src="config.js?v=40"></script>
  <script src="js/signaling.js?v=40"></script>
  <script src="js/glasses.js?v=40"></script>
</body>
</html>
