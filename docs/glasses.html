<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>View Caster — Glasses</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👓</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body class="glasses">
  <div class="container">
    <header>
      <h1>View Caster</h1>
    </header>

    <div id="pairing-view">
      <p class="code-timer" style="margin-bottom: 0.5rem;">Your pairing code</p>
      <div id="pair-code" class="pair-code" aria-live="polite">------</div>
      <p id="code-timer" class="code-timer">Connecting…</p>

      <div id="status" class="status waiting">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Waiting for pairing</span>
      </div>
    </div>

    <div id="connected-view" class="hidden">
      <p id="connected-label" class="connected-label">Connected</p>

      <div id="status-connected" class="status connected">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Linked to desktop</span>
      </div>

      <p id="session-code-label" class="code-timer" style="margin-top: 1rem;">Session code</p>
      <p id="session-code" class="pair-code" style="font-size: 2rem; padding: 0.5rem 0;" aria-live="polite">------</p>

      <p id="stream-hint" class="code-timer stream-hint">
        Open capture.html on your phone, then tap Live Stream.
      </p>

      <button id="stream-btn" class="btn btn-stream glasses-stream-btn" type="button" tabindex="0">
        Live Stream
      </button>
    </div>
  </div>

  <footer>Meta Display View Caster</footer>

  <script src="config.js?v=7"></script>
  <script src="js/signaling.js?v=7"></script>
  <script src="js/glasses.js?v=7"></script>
</body>
</html>
