name: ViewCasterRelay
options:
  bundleIdPrefix: com.mdvc
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    majorVersion: 124.0.0
targets:
  ViewCasterRelay:
    type: application
    platform: iOS
    sources:
      - path: ViewCasterRelay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdvc.viewcasterrelay
        INFOPLIST_KEY_CFBundleDisplayName: View Caster Relay
        INFOPLIST_KEY_NSCameraUsageDescription: Camera is used to stream your view to the desktop when you tap Live Stream on glasses.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
    dependencies:
      - package: WebRTC
