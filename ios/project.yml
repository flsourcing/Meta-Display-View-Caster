name: ViewCasterRelay
options:
  bundleIdPrefix: com.mdvc
  projectFormat: xcode16_0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    TARGETED_DEVICE_FAMILY: "1"
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    majorVersion: 124.0.0
  MWDAT:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: 0.7.0
targets:
  ViewCasterRelay:
    type: application
    platform: iOS
    sources:
      - path: ViewCasterRelay
    info:
      path: ViewCasterRelay/Info.plist
      properties:
        CFBundleDisplayName: View Caster Relay
        UILaunchScreen: {}
        MWDAT:
          AppLinkURLScheme: viewcaster://
          MetaAppID: "0"
          ClientToken: "0"
          TeamID: JM52FT93Z2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mdvc.viewcasterrelay
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
    dependencies:
      - package: WebRTC
      - package: MWDAT
        product: MWDATCore
      - package: MWDAT
        product: MWDATCamera
